name: Build Obsidian Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Package plugin
        run: |
          mkdir image-organizer
          cp main.js manifest.json styles.css image-organizer/
          zip -r image-organizer.zip image-organizer

      - uses: actions/upload-artifact@v4
        with:
          name: image-organizer
          path: image-organizer.zip

      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: image-organizer.zip
